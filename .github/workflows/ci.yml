name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Validate example OpenAPI
        run: node src/cli.mjs validate --spec examples/mini-openapi.json

      - name: Generate from example spec (smoke)
        run: |
          node src/cli.mjs openapi --spec examples/mini-openapi.json --out generated/ci-smoke.test.js
          test -s generated/ci-smoke.test.js
          grep -q "toMatchObject" generated/ci-smoke.test.js
          grep -q "JSON.stringify" generated/ci-smoke.test.js
